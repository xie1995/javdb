<div class="settings-page" id="search-engine-settings">
    <div class="settings-page-header">
        <button class="settings-back-btn" data-action="back-to-settings">
            <i class="fas fa-arrow-left"></i> 返回设置
        </button>
        <h2>搜索引擎设置</h2>
        <p class="settings-description">自定义点击番号后跳转的搜索网站。使用 <code>{{ID}}</code> 作为番号占位符。</p>
    </div>
    <div class="settings-page-body">
        <div class="search-engine-toolbar" aria-label="搜索引擎筛选">
            <label for="search-engine-category-filter">分类</label>
            <select id="search-engine-category-filter" class="search-engine-category-filter" data-settings-search-keywords="搜索引擎分类 引擎分类 分类过滤 搜索分类 字幕分类 资源分类">
                <option value="all">全部</option>
                <option value="search">搜索</option>
                <option value="resource">资源站</option>
                <option value="subtitle">字幕</option>
            </select>
        </div>
        <div class="search-engine-header">
            <div class="engine-icon">图标</div>
            <div id="search-engine-enabled-column" class="engine-enabled" data-settings-search-target data-settings-search-keywords="搜索引擎是否启用 是否启用 启用开关 显示开关">是否启用</div>
            <div class="engine-name">搜索引擎名称</div>
            <div class="engine-category">分类</div>
            <div class="engine-url">URL模板</div>
            <div class="engine-icon-url">图标地址</div>
            <div class="engine-actions">操作</div>
        </div>
        <div id="search-engine-list">
            <!-- 搜索引擎列表将由 JS 动态填充 -->
        </div>
        <button id="add-search-engine" class="button-like">
            <i class="fas fa-plus"></i> 添加新的搜索引擎
        </button>
    </div>
</div>
