<div class="settings-page" id="advanced-settings">
    <div class="settings-page-header">
        <button class="settings-back-btn" data-action="back-to-settings">
            <i class="fas fa-arrow-left"></i> 返回设置
        </button>
        <h2>高级配置</h2>
        <p class="settings-description">高级用户可以在此处查看和编辑原始配置数据。</p>
    </div>
    <div class="settings-page-body">
        <div class="settings-section advanced-hero">
            <div class="advanced-hero-card">
                <div class="advanced-hero-main">
                    <div>
                        <span class="advanced-eyebrow">Advanced Console</span>
                        <h4>原始配置工作台</h4>
                        <p class="advanced-hero-copy">这里提供原始 JSON 配置查看、编辑和完整备份导出。编辑配置会直接影响扩展行为。</p>
                    </div>
                    <div class="advanced-hero-actions">
                        <button id="viewJsonBtn" class="btn">查看设置</button>
                        <button id="editJsonBtn" class="btn warning">编辑设置</button>
                        <button id="exportJsonBtn" class="btn primary">导出完整备份</button>
                    </div>
                </div>

                <div class="advanced-warning-strip">
                    <span class="advanced-warning-icon">⚠️</span>
                    <span>编辑 JSON 前建议先导出完整备份，避免配置结构错误影响使用。</span>
                </div>
            </div>
        </div>

        <div class="advanced-tools-grid">
            <div class="settings-section settings-card advanced-tool-card logs-tool">
                <div class="advanced-tool-header">
                    <span class="advanced-tool-icon">📜</span>
                    <div>
                        <h4>原始日志</h4>
                        <p>查看扩展运行日志，用于定位异常和排查问题。</p>
                    </div>
                </div>
                <div class="action-buttons-top">
                    <button id="viewRawLogsBtn" class="btn">查看日志</button>
                    <button id="testLogBtn" class="btn">测试日志</button>
                </div>
                <p class="section-description">日志查看为只读操作，测试日志会写入一条新的诊断日志。</p>
            </div>

            <div class="settings-section settings-card advanced-tool-card telemetry-tool">
                <div class="advanced-tool-header">
                    <span class="advanced-tool-icon">📊</span>
                    <div>
                        <h4>使用情况统计</h4>
                        <p>帮助了解拓展功能使用状态。</p>
                    </div>
                </div>
                <label class="advanced-toggle-row" for="telemetryEnabled">
                    <span class="advanced-toggle-text">发送匿名使用情况统计</span>
                    <span class="advanced-toggle-switch">
                        <input type="checkbox" id="telemetryEnabled">
                        <span class="advanced-toggle-slider"></span>
                    </span>
                </label>
            </div>

            <div class="settings-section settings-card advanced-tool-card backup-tool">
                <div class="advanced-tool-header">
                    <span class="advanced-tool-icon">🧩</span>
                    <div>
                        <h4>使用建议</h4>
                        <p>高级功能适合调试、迁移和恢复配置时使用。</p>
                    </div>
                </div>
                <div class="advanced-note-list">
                    <span>先备份，再编辑。</span>
                    <span>修改 JSON 后刷新页面确认配置生效。</span>
                    <span>排查问题时先导出日志和完整备份。</span>
                </div>
            </div>
        </div>
    </div>
</div>
