<div class="card actors-page">
    <div class="actors-page-hero">
        <div>
            <span class="actors-eyebrow">Actors</span>
            <h3>演员库</h3>
            <p>管理演员资料、订阅状态、黑名单和元数据同步。</p>
        </div>
        <div class="actors-hero-mark">
            <i class="fas fa-users"></i>
        </div>
    </div>

    <!-- 演员库统计信息 -->
    <div class="stats-section">
        <div class="actors-section-header">
            <div>
                <h4>演员库概览</h4>
                <p>点击统计卡片可快速筛选演员。</p>
            </div>
        </div>
        <div id="actorStatsContainer" class="stats-grid">
            <!-- 统计信息将由 JS 动态填充 -->
        </div>
    </div>

    <!-- 搜索和过滤 -->
    <div class="actors-filter-panel">
        <div class="search-and-filter">
            <label class="actors-search-field" for="actorSearchInput">
                <i class="fas fa-search"></i>
                <input type="text" id="actorSearchInput" placeholder="搜索演员姓名或别名...">
            </label>
            <select id="actorGenderFilter">
                <option value="">所有性别</option>
                <option value="female">女性</option>
                <option value="male">男性</option>
                <option value="unknown">未知</option>
            </select>
            <select id="actorCategoryFilter">
                <option value="">所有分类</option>
                <option value="censored">有码</option>
                <option value="uncensored">无码</option>
                <option value="western">欧美</option>
                <option value="unknown">未知</option>
            </select>
            <select id="actorStatusFilter">
                <option value="all">全部</option>
                <option value="exclude">排除拉黑</option>
                <option value="only">仅拉黑</option>
                <option value="sub_only">只看已订阅</option>
                <option value="sub_exclude">已订阅且排除拉黑</option>
            </select>
            <select id="actorSortSelect">
                <option value="updatedAt_desc">按更新时间排序 (最新)</option>
                <option value="updatedAt_asc">按更新时间排序 (最旧)</option>
                <option value="name_asc">按姓名排序 (A-Z)</option>
                <option value="name_desc">按姓名排序 (Z-A)</option>
                <option value="worksCount_desc">按作品数量排序 (多到少)</option>
                <option value="worksCount_asc">按作品数量排序 (少到多)</option>
            </select>
            <button id="toggleActorViewModeBtn" class="button-like view-toggle list-mode" title="切换到卡片视图">
                <i class="fas fa-list view-icon"></i>
                <span class="view-text">列表视图</span>
            </button>
            <div class="page-size-wrapper">
                <span class="page-size-label">每页</span>
                <select id="actorPageSizeSelect">
                    <option value="20">20</option>
                    <option value="40">40</option>
                    <option value="60">60</option>
                    <option value="100">100</option>
                </select>
                <span class="page-size-label">个</span>
            </div>
        </div>
    </div>

    <!-- 批量操作栏 -->
    <div id="actorBatchOperations" class="batch-operations" style="display: none;">
        <div class="batch-operations-left">
            <input type="checkbox" id="actorSelectAllCheckbox" class="select-all-checkbox">
            <label for="actorSelectAllCheckbox" class="select-all-label">全选</label>
            <span id="actorSelectedCount" class="selected-count">已选择 0 项</span>
        </div>
        <div class="batch-operations-right">
            <button id="actorBatchRefreshBtn" class="batch-btn batch-refresh-btn" title="批量刷新元数据">
                <i class="fas fa-sync-alt"></i>
                刷新元数据
            </button>
            <button id="actorBatchBlacklistBtn" class="batch-btn batch-blacklist-btn" title="批量拉黑/取消拉黑">
                <i class="fas fa-ban"></i>
                拉黑管理
            </button>
            <button id="actorBatchSubscribeBtn" class="batch-btn batch-subscribe-btn" title="批量订阅/取消订阅">
                <i class="fas fa-bell"></i>
                订阅管理
            </button>
            <button id="actorBatchDeleteBtn" class="batch-btn batch-delete-btn" title="批量删除">
                <i class="fas fa-trash"></i>
                删除
            </button>
            <button id="actorCancelBatchBtn" class="batch-btn batch-cancel-btn" title="取消选择">
                <i class="fas fa-times"></i>
                取消
            </button>
        </div>
    </div>

    <!-- 演员列表容器 -->
    <div class="actor-list-wrapper">
        <div id="actorListLoading" class="loading-indicator" style="display: none;">
            <i class="fas fa-spinner fa-spin"></i>
            <span>加载中...</span>
        </div>
        <div id="actorListContainer" class="actor-list-container">
            <!-- 演员列表将由 JS 动态填充 -->
        </div>
    </div>

    <!-- 分页控件 -->
    <div class="pagination-controls">
        <div id="actorPaginationContainer" class="pagination">
            <!-- 分页控件将由 JS 动态填充 -->
        </div>
    </div>
</div>
