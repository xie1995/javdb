<div class="card drive115-tasks-page">
  <div class="drive115-tasks-hero">
    <div>
      <span class="drive115-eyebrow">Drive 115</span>
      <h3>离线任务中心</h3>
      <p>集中管理 115 网盘离线下载任务，支持链接添加、搜索过滤、刷新和清理。</p>
    </div>
    <div class="drive115-hero-mark">
      <i class="fas fa-cloud-download-alt"></i>
    </div>
  </div>

  <div class="stats-section">
    <h4>115网盘下载任务</h4>
    <div id="drive115TasksStatsContainer" class="stats-grid">
      <!-- 统计信息将由 JS 动态填充 -->
    </div>
  </div>

  <!-- 任务操作控制栏 -->
  <div class="drive115-tasks-controls">
    <div class="task-input-group drive115-add-panel">
      <div class="task-url-field">
        <i class="fas fa-link"></i>
        <input type="text" id="drive115TaskUrlInput" placeholder="输入下载链接，多个链接可用空格分隔" class="task-url-input">
      </div>
      <div class="task-dir-field" title="留空或 0 表示根目录">
        <i class="fas fa-folder"></i>
        <input type="text" id="drive115TaskDirInput" placeholder="下载目录 ID（cid）" class="task-dir-input">
      </div>
      <span id="drive115TaskDirSummary" class="drive115-task-dir-summary" title=""></span>
      <button id="drive115TaskChooseDirBtn" class="button-like secondary" title="选择 115 文件夹">
        <i class="fas fa-folder-open"></i>
      </button>
      <button id="drive115AddTaskBtn" class="button-like">
        <i class="fas fa-plus"></i>
        添加任务
      </button>
    </div>
    <div class="task-action-group">
      <div class="task-search-group">
        <i class="fas fa-search"></i>
        <input type="text" id="drive115TaskSearchInput" placeholder="搜索任务名称..." class="task-search-input">
        <button id="drive115ClearSearchBtn" class="button-like secondary" style="display: none;">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="task-buttons-group">
        <button id="drive115RefreshTasksBtn" class="button-like">
          <i class="fas fa-sync-alt"></i>
          刷新列表
        </button>
        <button id="drive115ClearTasksBtn" class="button-like danger">
          <i class="fas fa-trash"></i>
          清空所有
        </button>
      </div>
    </div>
  </div>

  <!-- 任务列表容器 -->
  <div class="drive115-tasks-wrapper">
    <div id="drive115TasksLoading" class="loading-indicator" style="display: none;">
      <i class="fas fa-spinner fa-spin"></i>
      <span>加载中...</span>
    </div>
    <div id="drive115TasksContainer" class="drive115-tasks-container">
      <!-- 任务列表将由 JS 动态填充 -->
    </div>
  </div>

  <!-- 分页控件 -->
  <div class="pagination-controls">
    <div id="drive115TasksPaginationContainer" class="pagination">
      <!-- 分页控件将由 JS 动态填充 -->
    </div>
  </div>
</div>
