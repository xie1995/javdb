<div class="settings-page" id="global-actions">
    <div class="settings-page-header">
        <button class="settings-back-btn" data-action="back-to-settings">
            <i class="fas fa-arrow-left"></i> 返回设置
        </button>
        <h2>全局操作</h2>
        <p class="settings-description">执行全局性的数据管理操作。请谨慎使用这些功能。</p>
    </div>
    <div class="settings-page-body">
        <div class="settings-section global-actions-hero">
            <div class="global-actions-card danger-card">
                <div class="global-actions-hero-main">
                    <div>
                        <span class="global-eyebrow">Critical Actions</span>
                        <h4>全局数据操作</h4>
                        <p class="global-hero-copy">这里集中放置会影响本地数据、缓存和扩展运行状态的操作。危险操作会保留确认流程。</p>
                    </div>
                    <div class="global-hero-action">
                        <button id="clearAllBtn" class="btn danger">清空所有本地记录</button>
                    </div>
                </div>

                <div class="global-warning-strip">
                    <span class="warning-icon">⚠️</span>
                    <span>清空所有本地记录会删除视频记录、演员数据和设置配置。</span>
                </div>
            </div>
        </div>

        <div class="global-actions-grid">
            <div class="settings-card settings-section action-tile cache-tile">
                <div class="action-tile-header">
                    <span class="action-icon">🧹</span>
                    <div>
                        <h4>缓存管理</h4>
                        <p>清理缓存和临时数据，保留核心记录。</p>
                    </div>
                </div>
                <div class="action-buttons-top">
                    <button id="clearCacheBtn" class="btn">清空缓存</button>
                    <button id="clearTempDataBtn" class="btn">清空临时数据</button>
                </div>
                <p class="input-description">
                    <strong>清空缓存:</strong> 清除图片、头像等缓存文件。<br>
                    <strong>清空临时数据:</strong> 清除搜索历史、临时设置等非关键数据。
                </p>
            </div>

            <div class="settings-card settings-section action-tile system-tile">
                <div class="action-tile-header">
                    <span class="action-icon">🔧</span>
                    <div>
                        <h4>系统操作</h4>
                        <p>恢复默认配置或重新加载扩展运行环境。</p>
                    </div>
                </div>
                <div class="action-buttons-top">
                    <button id="resetSettingsBtn" class="btn warning">重置所有设置</button>
                    <button id="reloadExtensionBtn" class="btn">重新加载扩展</button>
                </div>
                <p class="input-description">
                    <strong>重置所有设置:</strong> 恢复默认设置，保留数据记录。<br>
                    <strong>重新加载扩展:</strong> 重新加载扩展程序，用于解决运行异常。
                </p>
            </div>
        </div>
    </div>
</div>
