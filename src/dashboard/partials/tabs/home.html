<div class="home-page">
  <div class="card home-welcome home-charts">
    <h2><i class="fas fa-house"></i> 趋势概览</h2>
    <div class="home-charts-topbar">
      <div id="homeChartsToolbar" class="home-charts-toolbar">
        <label for="homeChartsRangePreset">时间范围</label>
        <select id="homeChartsRangePreset">
          <option value="7">近7天</option>
          <option value="14">近14天</option>
          <option value="30" selected>近30天</option>
          <option value="60">近60天</option>
          <option value="90">近90天</option>
          <option value="180">近180天</option>
          <option value="365">近一年</option>
          <option value="custom">自定义</option>
        </select>
        <input id="homeChartsRangeStart" type="date" style="display:none;" />
        <span id="homeChartsRangeSep" style="display:none;">—</span>
        <input id="homeChartsRangeEnd" type="date" style="display:none;" />
      </div>
      <button id="homeRefreshBtn" class="home-refresh-btn" title="刷新首页概览">
        <i class="fas fa-rotate"></i> 刷新
      </button>
    </div>
    <div class="trend-row">
      <div id="homeRecordsTrend" class="chart-card">
        <div class="chart-card-head">
          <div class="chart-title">番号库数据量趋势</div>
        </div>
        <div class="chart-card-body"></div>
      </div>
      <div id="homeActorsTrend" class="chart-card">
        <div class="chart-card-head">
          <div class="chart-title">演员库数据量趋势</div>
        </div>
        <div class="chart-card-body"></div>
      </div>
      <div id="homeNewWorksTrend" class="chart-card">
        <div class="chart-card-head">
          <div class="chart-title">新作品数据量趋势</div>
        </div>
        <div class="chart-card-body"></div>
      </div>
    </div>
    <div class="home-charts-grid">
      <div id="homeStatusDonut" class="chart-card">
        <div class="chart-card-head">
          <div class="chart-title">状态分布</div>
        </div>
        <div class="chart-card-body"></div>
      </div>
      <div id="homeTagsTop" class="chart-card">
        <div class="chart-card-head">
          <div class="chart-title">标签 Top 50</div>
          <div id="homeTagsPager" class="chart-pager">
            <button id="homeTagsPrevBtn" class="chart-pager-btn" title="上一页">‹</button>
            <span id="homeTagsPageText" class="chart-pager-text">1/1</span>
            <button id="homeTagsNextBtn" class="chart-pager-btn" title="下一页">›</button>
          </div>
        </div>
        <div class="chart-card-body"></div>
      </div>
    </div>
    <div class="home-stats">
      <div class="home-stats-shell">
        <div class="home-stats-header">
          <div class="home-stats-copy">
            <h3>数据概览</h3>
            <p>主面板总览</p>
          </div>
          <div class="home-stats-live">
            <span class="home-stats-live-dot"></span>
            实时
          </div>
        </div>

        <div class="home-kpi-hero">
          <div class="home-kpi-side">
            <div class="home-kpi-side-item clickable" data-filter="all">
              <span>收藏的番号总数</span>
              <strong id="homeHeroViewed">0</strong>
            </div>
            <div class="home-kpi-side-item clickable" data-filter="embyWatched">
              <span>已观看</span>
              <strong id="homeHeroBrowsed">0</strong>
            </div>
            <div class="home-kpi-side-item clickable" data-filter="inEmby">
              <span>已下载</span>
              <strong id="homeHeroWant">0</strong>
            </div>
            <div class="home-kpi-side-item clickable" data-filter="notDownloaded">
              <span>未下载</span>
              <strong id="homeHeroLast7">0</strong>
            </div>
          </div>
        </div>

        <div class="home-sections">
          <div class="stats-section">
            <h4>演员库概览</h4>
            <div id="homeActorsStatsContainer" class="stats-grid"></div>
          </div>
          <div class="stats-section">
            <h4>新作品概览</h4>
            <div id="homeNewWorksStatsContainer" class="stats-grid"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
