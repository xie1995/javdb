  <path d="M170 1056 L170 1065" class="line dash"/>

  <rect x="560" y="1550" width="1040" height="58" class="box" fill="#fff7ed" stroke="#f59e0b"/>
  <text x="1080" y="1584" text-anchor="middle" class="b">审阅关注点：当前图已补更多真实任务，但影片页可能仍有更细粒度运行点需要后续继续补齐</text>
</svg>
