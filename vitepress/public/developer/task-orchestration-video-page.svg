<svg xmlns="http://www.w3.org/2000/svg" width="2100" height="1640" viewBox="0 0 2100 1640" role="img" aria-labelledby="title desc">
  <title id="title">影片页任务执行与调度（树状，真实任务增强版）</title>
  <desc id="desc">展示影片页主链、状态支链、loadData 子任务组、翻译子任务、以及页面入口并行旁路任务组。</desc>
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #1f2937; }
      .h { font-size: 28px; font-weight: 700; }
      .t { font-size: 15px; font-weight: 700; }
      .b { font-size: 13px; }
      .s { font-size: 12px; }
      .box { rx: 16; ry: 16; stroke-width: 2; }
      .line { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 8 6; }
      .tag { font-size: 16px; font-weight: 700; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker>
  </defs>
  <rect width="2100" height="1640" fill="#ffffff"/>
  <text x="1050" y="42" text-anchor="middle" class="h">影片页 - 任务执行与调度（树状，真实任务增强版）</text>

  <text x="1060" y="88" class="tag">主链</text>
  <rect x="900" y="100" width="340" height="96" class="box" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="1070" y="128" text-anchor="middle" class="t">影片页入口</text>
  <text x="1070" y="150" text-anchor="middle" class="b">/v/* · 页面初始化开始</text>
  <text x="1070" y="172" text-anchor="middle" class="b">包含：预注册蓝图与页面上下文建立</text>

  <rect x="860" y="250" width="420" height="90" class="box" fill="#fee2e2" stroke="#f87171"/>
  <text x="1070" y="280" text-anchor="middle" class="t">enhancementUI:showLoadingIndicator</text>
  <text x="1070" y="302" text-anchor="middle" class="b">加载状态反馈 · critical / priority=13</text>

  <rect x="860" y="400" width="420" height="90" class="box" fill="#fee2e2" stroke="#f87171"/>
  <text x="1070" y="430" text-anchor="middle" class="t">videoStatus:initialSync</text>
  <text x="1070" y="452" text-anchor="middle" class="b">影片状态首轮同步 · critical / priority=12</text>

  <rect x="860" y="550" width="420" height="100" class="box" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="1070" y="580" text-anchor="middle" class="t">videoEnhancement:initCore</text>
  <text x="1070" y="602" text-anchor="middle" class="b">影片核心增强初始化 · high / priority=8</text>
  <text x="1070" y="624" text-anchor="middle" class="b">包含：核心框架 / 交互前置依赖</text>

  <rect x="860" y="710" width="420" height="90" class="box" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="1070" y="740" text-anchor="middle" class="t">videoEnhancement:clickEnhancement</text>
  <text x="1070" y="762" text-anchor="middle" class="b">影片交互增强 · high / priority=10</text>

  <rect x="860" y="870" width="420" height="100" class="box" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="1070" y="900" text-anchor="middle" class="t">videoEnhancement:loadData</text>
  <text x="1070" y="922" text-anchor="middle" class="b">影片数据加载 · deferred / timeout=10000</text>
  <text x="1070" y="944" text-anchor="middle" class="b">包含：后续增强共享数据准备</text>

  <rect x="860" y="1380" width="420" height="100" class="box" fill="#ede9fe" stroke="#8b5cf6"/>
  <text x="1070" y="1410" text-anchor="middle" class="t">videoEnhancement:finish</text>
  <text x="1070" y="1432" text-anchor="middle" class="b">详情页收尾与汇总 · idle / dependsOn=finishDependsOn</text>
  <text x="1070" y="1454" text-anchor="middle" class="b">汇总：videoStatus 支链、loadData 支链与部分旁路结果</text>

  <path d="M1070 196 L1070 250" class="line"/>
  <path d="M1070 340 L1070 400" class="line"/>
  <path d="M1070 490 L1070 550" class="line"/>
  <path d="M1070 650 L1070 710" class="line"/>
  <path d="M1070 800 L1070 870" class="line"/>
  <path d="M1070 970 L1070 1380" class="line"/>

  <text x="1530" y="320" class="tag">videoStatus 支链</text>
  <rect x="1400" y="350" width="220" height="62" class="box" fill="#fff1f2" stroke="#f87171"/>
  <text x="1510" y="376" text-anchor="middle" class="s">videoStatus:update</text>
  <text x="1510" y="396" text-anchor="middle" class="s">状态更新</text>
  <rect x="1400" y="430" width="220" height="62" class="box" fill="#fff1f2" stroke="#f87171"/>
  <text x="1510" y="456" text-anchor="middle" class="s">videoStatus:observer</text>
  <text x="1510" y="476" text-anchor="middle" class="s">状态观察器</text>
  <rect x="1400" y="510" width="220" height="62" class="box" fill="#fff1f2" stroke="#f87171"/>
  <text x="1510" y="536" text-anchor="middle" class="s">videoStatus:fullRefresh</text>
  <text x="1510" y="556" text-anchor="middle" class="s">全量状态刷新</text>
  <path d="M1280 445 L1400 381" class="line dash"/>
  <path d="M1280 445 L1400 461" class="line dash"/>
  <path d="M1280 445 L1400 541" class="line dash"/>
  <path d="M1510 412 L1160 1380" class="line dash"/>
  <path d="M1510 492 L1190 1380" class="line dash"/>
  <path d="M1510 572 L1220 1380" class="line dash"/>

  <rect x="220" y="1000" width="1340" height="250" class="box" fill="#fffbeb" stroke="#f59e0b"/>
  <text x="890" y="1030" text-anchor="middle" class="tag">loadData 子任务组</text>
  <rect x="260" y="1070" width="300" height="90" class="box" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="410" y="1098" text-anchor="middle" class="t">主任务：translateCurrentTitle</text>
  <text x="410" y="1120" text-anchor="middle" class="b">标题翻译主任务 · deferred / dependsOn=loadData</text>
  <rect x="590" y="1070" width="220" height="72" class="box" fill="#fff7ed" stroke="#f59e0b"/>
  <text x="700" y="1096" text-anchor="middle" class="s">translateCurrentTitle:prepare</text>
  <text x="700" y="1116" text-anchor="middle" class="s">翻译预处理</text>
  <rect x="840" y="1070" width="220" height="72" class="box" fill="#fff7ed" stroke="#f59e0b"/>
  <text x="950" y="1096" text-anchor="middle" class="s">translateCurrentTitle:request</text>
  <text x="950" y="1116" text-anchor="middle" class="s">翻译请求</text>
  <rect x="1090" y="1070" width="220" height="72" class="box" fill="#fff7ed" stroke="#f59e0b"/>
  <text x="1200" y="1096" text-anchor="middle" class="s">translateCurrentTitle:render</text>
  <text x="1200" y="1116" text-anchor="middle" class="s">翻译结果渲染</text>
  <rect x="590" y="1160" width="220" height="72" class="box" fill="#ede9fe" stroke="#8b5cf6"/>
  <text x="700" y="1186" text-anchor="middle" class="s">runCover</text>
  <text x="700" y="1206" text-anchor="middle" class="s">封面增强</text>
  <rect x="840" y="1160" width="220" height="72" class="box" fill="#ede9fe" stroke="#8b5cf6"/>
  <text x="950" y="1186" text-anchor="middle" class="s">runTitle</text>
  <text x="950" y="1206" text-anchor="middle" class="s">标题增强</text>
  <rect x="1090" y="1160" width="220" height="72" class="box" fill="#ede9fe" stroke="#8b5cf6"/>
  <text x="1200" y="1186" text-anchor="middle" class="s">runFC2Breaker</text>
  <text x="1200" y="1206" text-anchor="middle" class="s">FC2 破解</text>
  <rect x="1340" y="1160" width="220" height="72" class="box" fill="#ede9fe" stroke="#8b5cf6"/>
  <text x="1450" y="1186" text-anchor="middle" class="s">videoEnhancement:panel</text>
  <text x="1450" y="1206" text-anchor="middle" class="s">增强面板注入</text>

  <path d="M1070 970 L410 1070" class="line dash"/>
  <path d="M560 1115 L590 1106" class="line dash"/>
  <path d="M810 1106 L840 1106" class="line dash"/>
  <path d="M1060 1106 L1090 1106" class="line dash"/>
  <path d="M1070 970 L700 1160" class="line dash"/>
  <path d="M1070 970 L950 1160" class="line dash"/>
  <path d="M1070 970 L1200 1160" class="line dash"/>
  <path d="M1070 970 L1450 1160" class="line dash"/>
  <path d="M410 1160 L960 1380" class="line dash"/>
  <path d="M700 1232 L1000 1380" class="line dash"/>
  <path d="M950 1232 L1040 1380" class="line dash"/>
  <path d="M1200 1232 L1080 1380" class="line dash"/>
  <path d="M1450 1232 L1120 1380" class="line dash"/>

  <rect x="20" y="300" width="320" height="980" class="box" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="180" y="330" text-anchor="middle" class="tag">页面入口并行旁路任务组</text>
  <rect x="50" y="360" width="240" height="76" class="box" fill="#f3f4f6" stroke="#9ca3af"/>
  <text x="170" y="388" text-anchor="middle" class="t">actorRemarks:run</text>
  <text x="170" y="410" text-anchor="middle" class="b">演员备注主任务 · idle</text>
  <rect x="65" y="445" width="210" height="62" class="box" fill="#ffffff" stroke="#9ca3af"/>
  <text x="170" y="468" text-anchor="middle" class="s">actorRemarks:run:fetch-batch</text>
  <text x="170" y="488" text-anchor="middle" class="s">备注批量抓取</text>

  <rect x="50" y="535" width="240" height="76" class="box" fill="#f3f4f6" stroke="#9ca3af"/>
  <text x="170" y="563" text-anchor="middle" class="t">actorMarks:page</text>
  <text x="170" y="585" text-anchor="middle" class="b">演员标记 · idle</text>

  <rect x="50" y="625" width="240" height="76" class="box" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="170" y="653" text-anchor="middle" class="t">videoFavoriteRating:init</text>
  <text x="170" y="675" text-anchor="middle" class="b">收藏评分 · high / priority=6 / visible_only</text>

  <rect x="50" y="715" width="240" height="76" class="box" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="170" y="743" text-anchor="middle" class="t">actorQuickActions:init</text>
  <text x="170" y="765" text-anchor="middle" class="b">演员快捷操作 · high / priority=6</text>

  <rect x="50" y="805" width="240" height="76" class="box" fill="#f3f4f6" stroke="#9ca3af"/>
  <text x="170" y="833" text-anchor="middle" class="t">drive115:init:video</text>
  <text x="170" y="855" text-anchor="middle" class="b">115 初始化主任务 · idle</text>
  <rect x="65" y="890" width="210" height="62" class="box" fill="#ffffff" stroke="#9ca3af"/>
  <text x="170" y="913" text-anchor="middle" class="s">drive115:init:video:inject-buttons</text>
  <text x="170" y="933" text-anchor="middle" class="s">115 按钮注入</text>

  <rect x="50" y="980" width="240" height="76" class="box" fill="#f3f4f6" stroke="#9ca3af"/>
  <text x="170" y="1008" text-anchor="middle" class="t">insights:collector</text>
  <text x="170" y="1030" text-anchor="middle" class="b">数据洞察采集主任务 · idle</text>
  <rect x="65" y="1065" width="210" height="62" class="box" fill="#ffffff" stroke="#9ca3af"/>
  <text x="170" y="1088" text-anchor="middle" class="s">insights:collector:count-tags</text>
  <text x="170" y="1108" text-anchor="middle" class="s">标签计数统计</text>

  <path d="M900 145 L340 398" class="line dash"/>
  <path d="M170 436 L170 445" class="line dash"/>
  <path d="M900 145 L340 573" class="line dash"/>
  <path d="M900 145 L340 663" class="line dash"/>
