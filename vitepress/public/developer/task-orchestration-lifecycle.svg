<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="760" viewBox="0 0 1500 760" role="img" aria-labelledby="title desc">
  <title id="title">任务编排中心生命周期</title>
  <desc id="desc">展示任务从 descriptor 创建、注册、排队、申请租约、运行到完成、失败、暂停、取消的真实流转。</desc>
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #1f2937; }
      .title { font-size: 28px; font-weight: 700; }
      .label { font-size: 14px; font-weight: 700; }
      .body { font-size: 13px; }
      .line { stroke: #475569; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 8 6; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#475569" />
    </marker>
  </defs>
  <rect width="1500" height="760" fill="#ffffff"/>
  <text x="750" y="52" text-anchor="middle" class="title">任务编排中心生命周期</text>

  <rect x="60" y="300" width="190" height="80" rx="18" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="155" y="345" text-anchor="middle" class="label">createManagedTaskDescriptor</text>

  <ellipse cx="360" cy="340" rx="80" ry="42" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text x="360" y="346" text-anchor="middle" class="label">registered</text>
  <text x="360" y="366" text-anchor="middle" class="body">REGISTER</text>

  <ellipse cx="560" cy="340" rx="70" ry="42" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="560" y="346" text-anchor="middle" class="label">queued</text>

  <rect x="670" y="300" width="160" height="80" rx="18" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="750" y="335" text-anchor="middle" class="label">REQUEST_LEASE</text>
  <text x="750" y="358" text-anchor="middle" class="body">waitForTaskLease</text>

  <ellipse cx="940" cy="340" rx="70" ry="42" fill="#ede9fe" stroke="#a78bfa" stroke-width="2"/>
  <text x="940" y="346" text-anchor="middle" class="label">leased</text>

  <ellipse cx="1130" cy="340" rx="70" ry="42" fill="#ffedd5" stroke="#fb923c" stroke-width="2"/>
  <text x="1130" y="346" text-anchor="middle" class="label">running</text>

  <ellipse cx="1330" cy="220" rx="70" ry="42" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text x="1330" y="226" text-anchor="middle" class="label">done</text>
  <text x="1330" y="246" text-anchor="middle" class="body">COMPLETE</text>

  <ellipse cx="1330" cy="340" rx="70" ry="42" fill="#fee2e2" stroke="#f87171" stroke-width="2"/>
  <text x="1330" y="346" text-anchor="middle" class="label">error</text>
  <text x="1330" y="366" text-anchor="middle" class="body">FAIL</text>

  <ellipse cx="1130" cy="540" rx="70" ry="42" fill="#ede9fe" stroke="#a78bfa" stroke-width="2"/>
  <text x="1130" y="546" text-anchor="middle" class="label">paused</text>
  <text x="1130" y="566" text-anchor="middle" class="body">PAUSE</text>

  <ellipse cx="1330" cy="540" rx="80" ry="42" fill="#f3f4f6" stroke="#9ca3af" stroke-width="2"/>
  <text x="1330" y="546" text-anchor="middle" class="label">canceled</text>
  <text x="1330" y="566" text-anchor="middle" class="body">CANCEL</text>

  <rect x="690" y="130" width="180" height="110" rx="18" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="780" y="162" text-anchor="middle" class="label">waitReason</text>
  <text x="710" y="190" class="body">tab-hidden</text>
  <text x="710" y="212" class="body">higher-priority-wait</text>
  <text x="710" y="234" class="body">bucket:*</text>

  <rect x="1060" y="120" width="170" height="80" rx="18" fill="#fee2e2" stroke="#f87171" stroke-width="2"/>
  <text x="1145" y="154" text-anchor="middle" class="label">stale</text>
  <text x="1145" y="176" text-anchor="middle" class="body">heartbeatTs + timeoutMs</text>

  <path d="M250 340 L280 340" class="line"/>
  <path d="M440 340 L490 340" class="line"/>
  <path d="M630 340 L670 340" class="line"/>
  <path d="M830 340 L870 340" class="line"/>
  <path d="M1010 340 L1060 340" class="line"/>
  <path d="M1200 320 L1260 245" class="line"/>
  <path d="M1200 340 L1260 340" class="line"/>
  <path d="M1130 382 L1130 468" class="line"/>
  <path d="M1200 540 L1250 540" class="line"/>
  <path d="M1060 540 L560 382" class="line"/>
  <text x="805" y="500" class="body">RESUME → queued</text>
  <path d="M750 300 L780 240" class="line dash"/>
  <text x="742" y="282" class="body">denied</text>
  <path d="M1130 298 L1145 200" class="line dash"/>
  <text x="1160" y="250" class="body">HEARTBEAT / PROGRESS</text>
</svg>
