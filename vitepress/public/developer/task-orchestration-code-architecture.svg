<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="960" viewBox="0 0 1500 960" role="img" aria-labelledby="title desc">
  <title id="title">任务编排中心代码架构</title>
  <desc id="desc">展示 content、shared、background、dashboard 四层真实模块边界与调用关系。</desc>
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #1f2937; }
      .title { font-size: 28px; font-weight: 700; }
      .lane { stroke-width: 2; rx: 18; ry: 18; }
      .lane-title { font-size: 20px; font-weight: 700; }
      .box-title { font-size: 15px; font-weight: 700; }
      .body { font-size: 13px; }
      .line { stroke: #475569; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 8 6; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#475569" />
    </marker>
  </defs>
  <rect width="1500" height="960" fill="#ffffff"/>
  <text x="750" y="52" text-anchor="middle" class="title">任务编排中心代码架构</text>

  <rect x="50" y="90" width="300" height="800" class="lane" fill="#eff6ff" stroke="#60a5fa"/>
  <text x="200" y="126" text-anchor="middle" class="lane-title">content</text>
  <rect x="80" y="160" width="240" height="110" rx="14" fill="#ffffff" stroke="#60a5fa" stroke-width="2"/>
  <text x="100" y="188" class="box-title">`initOrchestrator.ts`</text>
  <text x="100" y="214" class="body">注册任务入口</text>
  <text x="100" y="238" class="body">fire-and-forget 启动</text>
  <rect x="80" y="320" width="240" height="170" rx="14" fill="#ffffff" stroke="#60a5fa" stroke-width="2"/>
  <text x="100" y="348" class="box-title">`taskRuntime.ts`</text>
  <text x="100" y="374" class="body">createManagedTaskDescriptor</text>
  <text x="100" y="398" class="body">runManagedTask / waitForTaskLease</text>
  <text x="100" y="422" class="body">retryBudget / activeManagedTaskIds</text>

  <rect x="390" y="90" width="300" height="800" class="lane" fill="#f0fdf4" stroke="#4ade80"/>
  <text x="540" y="126" text-anchor="middle" class="lane-title">shared</text>
  <rect x="420" y="160" width="240" height="190" rx="14" fill="#ffffff" stroke="#4ade80" stroke-width="2"/>
  <text x="440" y="188" class="box-title">`taskCenterProtocol.ts`</text>
  <text x="440" y="214" class="body">REGISTER / REQUEST_LEASE</text>
  <text x="440" y="238" class="body">HEARTBEAT / PROGRESS</text>
  <text x="440" y="262" class="body">PAUSE / RESUME / COMPLETE</text>
  <text x="440" y="286" class="body">FAIL / CANCEL / VISIBILITY</text>
  <text x="440" y="310" class="body">QUERY / CLEAR</text>
  <rect x="420" y="400" width="240" height="120" rx="14" fill="#ffffff" stroke="#4ade80" stroke-width="2"/>
  <text x="440" y="428" class="box-title">`taskCenterTypes.ts`</text>
  <text x="440" y="454" class="body">GlobalTaskDescriptor</text>
  <text x="440" y="478" class="body">GlobalTaskRuntimeState / GlobalTaskRecord</text>

  <rect x="730" y="90" width="430" height="800" class="lane" fill="#fff7ed" stroke="#fb923c"/>
  <text x="945" y="126" text-anchor="middle" class="lane-title">background</text>
  <rect x="760" y="160" width="370" height="200" rx="14" fill="#ffffff" stroke="#fb923c" stroke-width="2"/>
  <text x="780" y="188" class="box-title">`globalTaskCenter.ts`</text>
  <text x="780" y="214" class="body">register / requestLease / heartbeat / progress</text>
  <text x="780" y="238" class="body">pause / resume / complete / fail / cancel</text>
  <text x="780" y="262" class="body">queueScore / dedupeIndex / completedLabels</text>
  <text x="780" y="286" class="body">restoreFromStorage / persistToStorage</text>
  <rect x="760" y="410" width="170" height="110" rx="14" fill="#ffffff" stroke="#fb923c" stroke-width="2"/>
  <text x="780" y="438" class="box-title">`taskStateStore.ts`</text>
  <text x="780" y="464" class="body">tasks Map</text>
  <text x="780" y="488" class="body">tabVisibility Map</text>
  <rect x="960" y="410" width="170" height="110" rx="14" fill="#ffffff" stroke="#fb923c" stroke-width="2"/>
  <text x="980" y="438" class="box-title">`taskPolicy.ts`</text>
  <text x="980" y="464" class="body">resolveTaskBucket</text>
  <text x="980" y="488" class="body">TASK_BUCKET_LIMITS</text>
  <rect x="760" y="570" width="370" height="110" rx="14" fill="#ffffff" stroke="#fb923c" stroke-width="2"/>
  <text x="780" y="598" class="box-title">`taskCenterPolicyRuntime.ts`</text>
  <text x="780" y="624" class="body">getEffectiveBucketLimit</text>
  <text x="780" y="648" class="body">computeTaskDisposition</text>
  <rect x="830" y="730" width="230" height="120" rx="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="850" y="758" class="box-title">`chrome.storage.local`</text>
  <text x="850" y="784" class="body">snapshot restore / persist</text>
  <text x="850" y="808" class="body">taskCenter:snapshot / dedupeIndex</text>

  <rect x="1200" y="90" width="250" height="800" class="lane" fill="#f5f3ff" stroke="#a78bfa"/>
  <text x="1325" y="126" text-anchor="middle" class="lane-title">dashboard</text>
  <rect x="1225" y="170" width="200" height="160" rx="14" fill="#ffffff" stroke="#a78bfa" stroke-width="2"/>
  <text x="1245" y="198" class="box-title">`EnhancementSettings.ts`</text>
  <text x="1245" y="224" class="body">global / realtime / design 视图</text>
  <text x="1245" y="248" class="body">任务状态表 / 分组统计</text>
  <text x="1245" y="272" class="body">时间线 / phase / waitReason</text>

  <path d="M320 405 L420 405" class="line"/>
  <text x="334" y="392" class="body">register / lease / progress</text>
  <path d="M660 250 L760 250" class="line"/>
  <text x="674" y="236" class="body">runtime messages</text>
  <path d="M660 460 L760 260" class="line dash"/>
  <text x="676" y="432" class="body">descriptor / runtime state</text>
  <path d="M930 465 L760 320" class="line"/>
  <text x="766" y="396" class="body">task records</text>
  <path d="M960 465 L900 360" class="line"/>
  <text x="942" y="398" class="body">bucket / limit</text>
  <path d="M945 570 L945 360" class="line"/>
  <text x="958" y="540" class="body">visibility / stale</text>
  <path d="M945 360 L945 730" class="line"/>
  <text x="958" y="706" class="body">restore / persist</text>
  <path d="M1225 250 L1130 250" class="line"/>
  <text x="1146" y="236" class="body">QUERY / CLEAR</text>
</svg>
