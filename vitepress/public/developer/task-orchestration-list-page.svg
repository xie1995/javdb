<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1320" viewBox="0 0 1900 1320" role="img" aria-labelledby="title desc">
  <title id="title">列表页任务执行与调度（树状）</title>
  <desc id="desc">由上到下展示列表页主链、listEnhancement 子任务组，以及页面入口并行旁路任务组。</desc>
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #1f2937; }
      .h { font-size: 28px; font-weight: 700; }
      .t { font-size: 15px; font-weight: 700; }
      .b { font-size: 13px; }
      .box { rx: 16; ry: 16; stroke-width: 2; }
      .line { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 8 6; }
      .tag { font-size: 16px; font-weight: 700; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker>
  </defs>
  <rect width="1900" height="1320" fill="#ffffff"/>
  <text x="950" y="42" text-anchor="middle" class="h">列表页 - 任务执行与调度（树状）</text>

  <text x="1090" y="88" class="tag">主链</text>
  <rect x="900" y="100" width="360" height="90" class="box" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="1080" y="130" text-anchor="middle" class="t">列表页入口</text>
  <text x="1080" y="152" text-anchor="middle" class="b">非 /v/* 且非 /actors/* · 页面初始化开始</text>

  <rect x="880" y="250" width="400" height="90" class="box" fill="#fee2e2" stroke="#f87171"/>
  <text x="1080" y="280" text-anchor="middle" class="t">list:observe:init</text>
  <text x="1080" y="302" text-anchor="middle" class="b">列表观察与初始处理 · critical / background_allowed</text>

  <rect x="880" y="410" width="400" height="100" class="box" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="1080" y="440" text-anchor="middle" class="t">listEnhancement:init</text>
  <text x="1080" y="462" text-anchor="middle" class="b">列表增强初始化 · high / priority=7</text>
  <text x="1080" y="484" text-anchor="middle" class="b">包含：多个列表增强子任务</text>

  <rect x="880" y="580" width="400" height="90" class="box" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="1080" y="610" text-anchor="middle" class="t">list:reprocess:after-listEnhancement</text>
  <text x="1080" y="632" text-anchor="middle" class="b">列表增强后二次处理 · high / priority=6</text>

  <rect x="880" y="1080" width="400" height="90" class="box" fill="#ede9fe" stroke="#8b5cf6"/>
  <text x="1080" y="1110" text-anchor="middle" class="t">列表页主链收尾</text>
  <text x="1080" y="1132" text-anchor="middle" class="b">目标：观察器已接管 + 首轮增强已完成</text>

  <path d="M1080 190 L1080 250" class="line"/>
  <path d="M1080 340 L1080 410" class="line"/>
  <path d="M1080 510 L1080 580" class="line"/>
  <path d="M1080 670 L1080 1080" class="line"/>

  <rect x="340" y="730" width="1040" height="210" class="box" fill="#fffbeb" stroke="#f59e0b"/>
  <text x="860" y="760" text-anchor="middle" class="tag">listEnhancement:init 子任务组</text>
  <rect x="390" y="790" width="220" height="84" class="box" fill="#ffffff" stroke="#f59e0b"/>
  <text x="500" y="820" text-anchor="middle" class="t">子任务：滚动翻页初始化</text>
  <text x="500" y="842" text-anchor="middle" class="b">列表翻页能力接管</text>
  <rect x="640" y="790" width="220" height="84" class="box" fill="#ffffff" stroke="#f59e0b"/>
  <text x="750" y="820" text-anchor="middle" class="t">子任务：演员过滤规则准备</text>
  <text x="750" y="842" text-anchor="middle" class="b">黑名单 / 非收藏 / 未识别</text>
  <rect x="890" y="790" width="220" height="84" class="box" fill="#ffffff" stroke="#f59e0b"/>
  <text x="1000" y="820" text-anchor="middle" class="t">子任务：列表显示控制样式应用</text>
  <text x="1000" y="842" text-anchor="middle" class="b">列数 / 宽度 / 容器扩展</text>
  <rect x="1140" y="790" width="220" height="84" class="box" fill="#ffffff" stroke="#f59e0b"/>
  <text x="1250" y="820" text-anchor="middle" class="t">子任务：状态标签显示能力初始化</text>
  <text x="1250" y="842" text-anchor="middle" class="b">卡片状态角标 / 展示增强</text>

  <path d="M1080 510 L500 790" class="line dash"/>
  <path d="M1080 510 L750 790" class="line dash"/>
  <path d="M1080 510 L1000 790" class="line dash"/>
  <path d="M1080 510 L1250 790" class="line dash"/>
  <path d="M500 874 L1010 1080" class="line dash"/>
  <path d="M750 874 L1040 1080" class="line dash"/>
  <path d="M1000 874 L1080 1080" class="line dash"/>
  <path d="M1250 874 L1120 1080" class="line dash"/>

  <rect x="20" y="300" width="300" height="340" class="box" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="170" y="330" text-anchor="middle" class="tag">页面入口并行旁路任务组</text>
  <rect x="50" y="370" width="240" height="76" class="box" fill="#f3f4f6" stroke="#9ca3af"/>
  <text x="170" y="398" text-anchor="middle" class="t">旁路任务：drive115:init:list</text>
  <text x="170" y="420" text-anchor="middle" class="b">115 初始化 · idle</text>
  <rect x="50" y="470" width="240" height="76" class="box" fill="#f3f4f6" stroke="#9ca3af"/>
  <text x="170" y="498" text-anchor="middle" class="t">旁路任务：contentFilter:initialize</text>
  <text x="170" y="520" text-anchor="middle" class="b">内容过滤初始化 · idle</text>

  <path d="M900 145 L320 408" class="line dash"/>
  <path d="M900 145 L320 508" class="line dash"/>

  <rect x="560" y="1210" width="1040" height="58" class="box" fill="#fff7ed" stroke="#f59e0b"/>
  <text x="1080" y="1244" text-anchor="middle" class="b">审阅关注点：观察器是否应最先执行，二次处理是否只是补偿层，115 是否继续保持 idle</text>
</svg>
