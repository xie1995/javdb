<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">任务编排中心总览</title>
  <desc id="desc">展示内容脚本、共享协议、全局编排中心、策略与配额、状态存储、Dashboard 观测与控制之间的真实关系。</desc>
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #1f2937; }
      .title { font-size: 28px; font-weight: 700; }
      .label { font-size: 16px; font-weight: 700; }
      .body { font-size: 14px; }
      .small { font-size: 13px; }
      .box { rx: 18; ry: 18; stroke-width: 2; }
      .line { stroke: #4b5563; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 8 6; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#4b5563" />
    </marker>
  </defs>
  <rect width="1400" height="820" fill="#ffffff"/>
  <text x="700" y="56" text-anchor="middle" class="title">任务编排中心总览</text>

  <rect x="80" y="120" width="270" height="120" class="box" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="215" y="155" text-anchor="middle" class="label">任务来源</text>
  <text x="105" y="188" class="body">- `content/initOrchestrator.ts`</text>
  <text x="105" y="214" class="body">- `content/taskRuntime.ts`</text>

  <rect x="80" y="320" width="300" height="140" class="box" fill="#dcfce7" stroke="#4ade80"/>
  <text x="230" y="355" text-anchor="middle" class="label">注册与协议</text>
  <text x="105" y="388" class="body">- `shared/taskCenterProtocol.ts`</text>
  <text x="105" y="414" class="body">- `shared/taskCenterTypes.ts`</text>
  <text x="105" y="440" class="small">REGISTER / REQUEST_LEASE / HEARTBEAT / QUERY</text>

  <rect x="490" y="250" width="420" height="190" class="box" fill="#ffedd5" stroke="#fb923c"/>
  <text x="700" y="286" text-anchor="middle" class="label">全局编排中心</text>
  <text x="545" y="320" class="body">- `background/globalTaskCenter.ts`</text>
  <text x="545" y="346" class="body">- register / queue / requestLease</text>
  <text x="545" y="372" class="body">- heartbeat / progress / pause / resume</text>
  <text x="545" y="398" class="body">- complete / fail / cancel / clear</text>

  <rect x="1040" y="120" width="290" height="150" class="box" fill="#fee2e2" stroke="#f87171"/>
  <text x="1185" y="156" text-anchor="middle" class="label">策略与配额</text>
  <text x="1065" y="190" class="body">- `background/taskPolicy.ts`</text>
  <text x="1065" y="216" class="body">- `background/taskCenterPolicyRuntime.ts`</text>
  <text x="1065" y="242" class="small">phase / bucket / visibility / stale</text>

  <rect x="1020" y="340" width="320" height="160" class="box" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="1180" y="376" text-anchor="middle" class="label">状态存储</text>
  <text x="1045" y="410" class="body">- `background/taskStateStore.ts`</text>
  <text x="1045" y="436" class="body">- `chrome.storage.local` snapshot</text>
  <text x="1045" y="462" class="small">tasks / dedupeIndex / completedLabels</text>

  <rect x="480" y="590" width="440" height="150" class="box" fill="#ede9fe" stroke="#a78bfa"/>
  <text x="700" y="626" text-anchor="middle" class="label">观测与控制</text>
  <text x="525" y="660" class="body">- Dashboard `EnhancementSettings.ts`</text>
  <text x="525" y="686" class="body">- global / realtime / design 视图</text>
  <text x="525" y="712" class="small">QUERY / CLEAR / 状态表 / 分组统计 / 时间线</text>

  <rect x="90" y="610" width="240" height="100" class="box" fill="#f3f4f6" stroke="#9ca3af"/>
  <text x="210" y="645" text-anchor="middle" class="label">用户操作</text>
  <text x="115" y="678" class="body">暂停 / 恢复 / 取消 / 查看状态</text>

  <path d="M350 180 L420 180 L420 360 L490 360" class="line"/>
  <text x="376" y="172" class="small">REGISTER / REQUEST_LEASE</text>

  <path d="M380 390 L490 390" class="line"/>
  <text x="405" y="380" class="small">协议 + 类型</text>

  <path d="M1040 230 L960 230 L960 300 L910 300" class="line dash"/>
  <text x="960" y="216" class="small">phase / bucket / visibility</text>

  <path d="M910 390 L1020 390" class="line"/>
  <text x="930" y="380" class="small">内存态 / 快照 / dedupe</text>

  <path d="M700 440 L700 590" class="line"/>
  <text x="716" y="520" class="small">QUERY / CLEAR</text>

  <path d="M330 660 L480 660" class="line"/>
  <text x="365" y="650" class="small">查看 / 操作</text>

  <path d="M350 210 L470 210 L470 285 L490 285" class="line dash"/>
  <text x="390" y="202" class="small">mark-completed / check-completed</text>
</svg>
