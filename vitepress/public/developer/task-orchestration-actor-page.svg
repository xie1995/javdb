<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1240" viewBox="0 0 1900 1240" role="img" aria-labelledby="title desc">
  <title id="title">演员页任务执行与调度（树状）</title>
  <desc id="desc">由上到下展示演员页主链、actorEnhancement 子任务组，以及页面入口并行旁路任务组。</desc>
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #1f2937; }
      .h { font-size: 28px; font-weight: 700; }
      .t { font-size: 15px; font-weight: 700; }
      .b { font-size: 13px; }
      .box { rx: 16; ry: 16; stroke-width: 2; }
      .line { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 8 6; }
      .tag { font-size: 16px; font-weight: 700; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker>
  </defs>
  <rect width="1900" height="1240" fill="#ffffff"/>
  <text x="950" y="42" text-anchor="middle" class="h">演员页 - 任务执行与调度（树状）</text>

  <text x="1070" y="88" class="tag">主链</text>
  <rect x="900" y="100" width="360" height="90" class="box" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="1080" y="130" text-anchor="middle" class="t">演员页入口</text>
  <text x="1080" y="152" text-anchor="middle" class="b">/actors/* · 页面初始化开始</text>

  <rect x="880" y="250" width="400" height="100" class="box" fill="#fee2e2" stroke="#f87171"/>
  <text x="1080" y="280" text-anchor="middle" class="t">actorEnhancement:init</text>
  <text x="1080" y="302" text-anchor="middle" class="b">演员页增强初始化 · critical / background_allowed</text>
  <text x="1080" y="324" text-anchor="middle" class="b">包含：多个演员页增强子任务</text>

  <rect x="880" y="420" width="400" height="90" class="box" fill="#fee2e2" stroke="#f87171"/>
  <text x="1080" y="450" text-anchor="middle" class="t">actorEnhancement:actionButtons</text>
  <text x="1080" y="472" text-anchor="middle" class="b">演员页操作按钮增强 · critical / priority=9</text>

  <rect x="880" y="1000" width="400" height="90" class="box" fill="#ede9fe" stroke="#8b5cf6"/>
  <text x="1080" y="1030" text-anchor="middle" class="t">演员页主链收尾</text>
  <text x="1080" y="1052" text-anchor="middle" class="b">目标：基础增强已生效 + 操作入口已暴露</text>

  <path d="M1080 190 L1080 250" class="line"/>
  <path d="M1080 350 L1080 420" class="line"/>
  <path d="M1080 510 L1080 1000" class="line"/>

  <rect x="340" y="590" width="1100" height="220" class="box" fill="#fffbeb" stroke="#f59e0b"/>
  <text x="890" y="620" text-anchor="middle" class="tag">actorEnhancement:init 子任务组</text>
  <rect x="390" y="660" width="230" height="84" class="box" fill="#ffffff" stroke="#f59e0b"/>
  <text x="505" y="690" text-anchor="middle" class="t">子任务：自动标签配置生效</text>
  <text x="505" y="712" text-anchor="middle" class="b">默认标签策略准备</text>
  <rect x="650" y="660" width="230" height="84" class="box" fill="#ffffff" stroke="#f59e0b"/>
  <text x="765" y="690" text-anchor="middle" class="t">子任务：默认标签与排序载入</text>
  <text x="765" y="712" text-anchor="middle" class="b">演员页默认展示规则建立</text>
  <rect x="910" y="660" width="230" height="84" class="box" fill="#ffffff" stroke="#f59e0b"/>
  <text x="1025" y="690" text-anchor="middle" class="t">子任务：时间分段显示配置生效</text>
  <text x="1025" y="712" text-anchor="middle" class="b">影片分段能力准备</text>
  <rect x="1170" y="660" width="230" height="84" class="box" fill="#ffffff" stroke="#f59e0b"/>
  <text x="1285" y="690" text-anchor="middle" class="t">子任务：扫描新作品按钮配置生效</text>
  <text x="1285" y="712" text-anchor="middle" class="b">演员页扫描按钮策略准备</text>

  <path d="M1080 350 L505 660" class="line dash"/>
  <path d="M1080 350 L765 660" class="line dash"/>
  <path d="M1080 350 L1025 660" class="line dash"/>
  <path d="M1080 350 L1285 660" class="line dash"/>
  <path d="M505 744 L1005 1000" class="line dash"/>
  <path d="M765 744 L1045 1000" class="line dash"/>
  <path d="M1025 744 L1080 1000" class="line dash"/>
  <path d="M1285 744 L1120 1000" class="line dash"/>

  <rect x="20" y="300" width="320" height="250" class="box" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="180" y="330" text-anchor="middle" class="tag">页面入口并行旁路任务组</text>
  <rect x="50" y="380" width="260" height="88" class="box" fill="#f3f4f6" stroke="#9ca3af"/>
  <text x="180" y="410" text-anchor="middle" class="t">旁路任务：actorRemarks:actorPage</text>
  <text x="180" y="432" text-anchor="middle" class="b">演员页备注展示 · idle / timeout=设置项控制</text>

  <path d="M900 145 L340 420" class="line dash"/>

  <rect x="560" y="1130" width="1040" height="58" class="box" fill="#fff7ed" stroke="#f59e0b"/>
  <text x="1080" y="1164" text-anchor="middle" class="b">审阅关注点：两个 critical 是否都应这么靠前，actorRemarks 是否继续保持旁路 idle</text>
</svg>
